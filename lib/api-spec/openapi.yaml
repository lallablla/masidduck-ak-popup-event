openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Event settings operations
  - name: analytics
    description: Analytics operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current event settings
      description: Returns the current settings for all visitors
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSettings"
    post:
      operationId: updateSettings
      tags: [settings]
      summary: Update event settings (admin only)
      description: Validates admin password server-side and updates the event settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventSettings"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analytics/track:
    post:
      operationId: trackEvent
      tags: [analytics]
      summary: Track a user event (page view or button click)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrackEventInput"
      responses:
        "200":
          description: Tracked successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackOkResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /analytics:
    post:
      operationId: getAnalytics
      tags: [analytics]
      summary: Get analytics data (admin only)
      description: Returns aggregated analytics data. Password validated server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAuth"
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChannelButton:
      type: object
      properties:
        id:
          type: string
          enum: [instagram, naver, kakao, youtube]
        label:
          type: string
        description:
          type: string
        url:
          type: string
        visible:
          type: boolean
      required:
        - id
        - label
        - description
        - url
        - visible
    EventSettings:
      type: object
      properties:
        pageTitle:
          type: string
        dateRange:
          type: string
        noticeTitle:
          type: string
        noticeBody:
          type: string
        eventStatus:
          type: string
          enum:
            - 전체 이벤트 진행 중
            - 인스타 인증 이벤트만 진행 중
            - 빠른 참여 이벤트만 진행 중
            - 증정품 소진
            - 이벤트 일시 중단
        highlightMessage:
          type: string
        mainEventActive:
          type: boolean
        mainEventBenefit:
          type: string
        mainEventTitle:
          type: string
        mainEventDescription:
          type: string
        mainEventHashtagsRequired:
          type: array
          items:
            type: string
        mainEventHashtagsRecommended:
          type: array
          items:
            type: string
        subEventActive:
          type: boolean
        subEventBenefit:
          type: string
        subEventTitle:
          type: string
        subEventDescription:
          type: string
        plusEventActive:
          type: boolean
        plusEventBenefit:
          type: string
        plusEventTitle:
          type: string
        plusEventDescription:
          type: string
        channelOrder:
          type: array
          items:
            type: string
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/ChannelButton"
      required:
        - pageTitle
        - dateRange
        - noticeTitle
        - noticeBody
        - eventStatus
        - highlightMessage
        - mainEventActive
        - mainEventBenefit
        - mainEventTitle
        - mainEventDescription
        - mainEventHashtagsRequired
        - mainEventHashtagsRecommended
        - subEventActive
        - subEventBenefit
        - subEventTitle
        - subEventDescription
        - plusEventActive
        - plusEventBenefit
        - plusEventTitle
        - plusEventDescription
        - channelOrder
        - buttons
    SettingsInput:
      type: object
      properties:
        password:
          type: string
        pageTitle:
          type: string
        dateRange:
          type: string
        noticeTitle:
          type: string
        noticeBody:
          type: string
        eventStatus:
          type: string
          enum:
            - 전체 이벤트 진행 중
            - 인스타 인증 이벤트만 진행 중
            - 빠른 참여 이벤트만 진행 중
            - 증정품 소진
            - 이벤트 일시 중단
        highlightMessage:
          type: string
        mainEventActive:
          type: boolean
        mainEventBenefit:
          type: string
        mainEventTitle:
          type: string
        mainEventDescription:
          type: string
        mainEventHashtagsRequired:
          type: array
          items:
            type: string
        mainEventHashtagsRecommended:
          type: array
          items:
            type: string
        subEventActive:
          type: boolean
        subEventBenefit:
          type: string
        subEventTitle:
          type: string
        subEventDescription:
          type: string
        plusEventActive:
          type: boolean
        plusEventBenefit:
          type: string
        plusEventTitle:
          type: string
        plusEventDescription:
          type: string
        channelOrder:
          type: array
          items:
            type: string
        buttons:
          type: array
          items:
            $ref: "#/components/schemas/ChannelButton"
      required:
        - password
        - pageTitle
        - dateRange
        - noticeTitle
        - noticeBody
        - eventStatus
        - highlightMessage
        - mainEventActive
        - mainEventBenefit
        - mainEventTitle
        - mainEventDescription
        - mainEventHashtagsRequired
        - mainEventHashtagsRecommended
        - subEventActive
        - subEventBenefit
        - subEventTitle
        - subEventDescription
        - plusEventActive
        - plusEventBenefit
        - plusEventTitle
        - plusEventDescription
        - channelOrder
        - buttons
    TrackEventInput:
      type: object
      properties:
        type:
          type: string
          enum: [pageview, click]
        channel:
          type: string
          nullable: true
        dwellMs:
          type: number
          nullable: true
      required:
        - type
    TrackOkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    AdminAuth:
      type: object
      properties:
        password:
          type: string
      required:
        - password
    ChannelStats:
      type: object
      properties:
        clicks:
          type: number
        avgDwellMs:
          type: number
      required:
        - clicks
        - avgDwellMs
    AnalyticsData:
      type: object
      properties:
        pageViews:
          type: number
        totalClicks:
          type: number
        channelStats:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ChannelStats"
      required:
        - pageViews
        - totalClicks
        - channelStats
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
